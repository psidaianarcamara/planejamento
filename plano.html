<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Planejamento Financeiro</title>
<style>
  :root {
    --terra: #d0a85f; --terra-light: #f2ebc4; --terra-mid: #e8d49a;
    --terra-dark: #581e0a; --terra-deep: #581e0a;
    --text: #2C1A14; --text-muted: #7A5A50;
    --bg: #f2ebc4; --white: #fff; --border: #dfd0a0;
    --radius: 10px; --shadow: 0 2px 12px rgba(208,168,95,0.12);
    --green: #2A8A55; --green-light: #F0FAF4; --green-border: #9DD4B2;
    --yellow: #B8860B; --yellow-light: #FFFBEA; --yellow-border: #F0D060;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { background: var(--white); border-bottom: 1px solid var(--border); padding: 16px 24px; }
  .header-inner { max-width: 560px; margin: 0 auto; display: flex; align-items: center; gap: 14px; }
  .logo-img { width: 48px; height: 48px; object-fit: contain; }
  .header-text { flex: 1; }
  .header-name { font-size: 16px; font-weight: 700; color: var(--terra-deep); }
  .header-crp { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .header-specialty { font-size: 12px; color: var(--terra); margin-top: 2px; font-weight: 500; }

  .main { max-width: 560px; margin: 0 auto; padding: 24px 16px 48px; }

  .welcome { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 16px 20px; margin-bottom: 20px; box-shadow: var(--shadow); }
  .welcome-name { font-size: 18px; font-weight: 700; color: var(--terra-deep); }
  .welcome-sub { font-size: 13px; color: var(--text-muted); margin-top: 3px; }

  .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 10px; text-align: center; box-shadow: var(--shadow); }
  .stat-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-value { font-size: 20px; font-weight: 700; color: var(--terra-deep); margin-top: 3px; line-height: 1; }
  .stat-sub { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  .month-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 14px; overflow: hidden; box-shadow: var(--shadow); }
  .month-header { padding: 12px 16px; background: var(--terra-light); border-bottom: 1px solid var(--terra-mid); }
  .month-title { font-size: 13px; font-weight: 700; color: var(--terra); text-transform: uppercase; letter-spacing: 0.08em; }
  .month-summary { font-size: 12px; color: var(--terra-dark); margin-top: 2px; }
  .sessions-list { padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; }

  .session-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 9px; transition: all 0.2s; }
  .session-row.solicitado { background: var(--yellow-light); border-color: var(--yellow-border); }
  .session-row.confirmado { background: var(--green-light); border-color: var(--green-border); }

  .session-left { display: flex; align-items: center; gap: 12px; }
  .session-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--terra-mid); flex-shrink: 0; }
  .session-row.solicitado .session-dot { background: var(--yellow); }
  .session-row.confirmado .session-dot { background: var(--green); }
  .session-date { font-size: 15px; font-weight: 700; color: var(--text); }
  .session-row.confirmado .session-date { color: #1a5c38; }
  .session-price { font-size: 13px; color: var(--text-muted); }

  .session-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
  .pay-label-wrap { display: flex; align-items: center; gap: 7px; cursor: pointer; user-select: none; }
  .pay-label-wrap.disabled { cursor: default; opacity: 0.6; }
  .pay-check { width: 20px; height: 20px; accent-color: var(--green); cursor: pointer; flex-shrink: 0; }
  .pay-text { font-size: 13px; font-weight: 500; color: var(--text-muted); }
  .session-row.confirmado .pay-text { color: var(--green); font-weight: 700; }
  .session-row.solicitado .pay-text { color: var(--yellow); font-weight: 600; }
  .aguardando-text { font-size: 11px; color: var(--yellow); font-weight: 500; }

  .month-footer { display: flex; justify-content: space-between; padding: 8px 14px 12px; }
  .month-count { font-size: 12px; color: var(--text-muted); }
  .month-total { font-size: 13px; font-weight: 700; color: var(--terra-deep); }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1a1a; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.2s, transform 0.2s; z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--green); }
  .toast.info { background: var(--yellow); }

  .loading { text-align: center; padding: 48px 0; color: var(--text-muted); font-size: 14px; }
  .error-box { text-align: center; padding: 48px 16px; }
  .error-icon { font-size: 40px; margin-bottom: 12px; }
  .error-title { font-size: 17px; font-weight: 700; color: var(--terra-deep); margin-bottom: 6px; }
  .error-sub { font-size: 14px; color: var(--text-muted); }

  .footer { border-top: 1px solid var(--border); padding: 16px 24px; text-align: center; margin-top: 8px; }
  .footer-name { font-size: 12px; font-weight: 600; color: var(--terra); }
  .footer-text { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  @media (max-width: 400px) { .summary { gap: 6px; } .stat-value { font-size: 17px; } }
</style>
</head>

    <div class="header-text">
      <div class="header-name">Daiana Câmara</div>
      <div class="header-specialty">Planejamento Financeiro</div>
    </div>
  </div>
</header>

<main class="main" id="main">
  <div class="loading">Carregando seu planejamento...</div>
</main>

<footer class="footer">
  <div class="footer-name" id="ftr-rod1"></div>
  <div class="footer-text" id="ftr-rod2"></div>
</footer>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://hxgjfhakfhmnxzvgyjvh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_qibTEcMy85iMaK4uGv9nGA_X8DuqaBj';
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

let plano = null;
const token = new URLSearchParams(window.location.search).get('t');

function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.className = 'toast', 3000);
}

function api(method, path, body) {
  return fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: body ? JSON.stringify(body) : undefined
  }).then(r => r.ok ? r.json() : r.json().then(e => { throw e; }));
}

async function carregarCabecalho() {
  try {
    const r = await fetch(SUPABASE_URL + '/rest/v1/planejamentos?token=eq.CABECALHO_V2&select=tipo_atendimento', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    const data = await r.json();
    if (data && data.length > 0 && data[0].tipo_atendimento) {
      try {
        const cab = JSON.parse(data[0].tipo_atendimento);
        if (cab.nome) document.getElementById('hdr-nome').textContent = cab.nome;
        if (cab.sub) document.getElementById('hdr-sub').textContent = cab.sub;
        if (cab.esp) document.getElementById('hdr-esp').textContent = cab.esp;
        if (cab.rod1) document.getElementById('ftr-rod1').textContent = cab.rod1;
        if (cab.rod2) document.getElementById('ftr-rod2').textContent = cab.rod2;
      } catch(e) {}
    }
  } catch(e) {}
}

async function carregar() {
  if (!token) { renderErro('Link inválido', 'Este link não contém um planejamento válido.'); return; }
  try {
    const r = await fetch(SUPABASE_URL + '/rest/v1/planejamentos?token=eq.' + token + '&select=*', {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
    });
    const data = await r.json();
    if (!data || data.length === 0) { renderErro('Planejamento não encontrado', 'Este link pode ter expirado ou sido removido.'); return; }
    plano = data[0];
    plano.pagamentos_cliente = plano.pagamentos_cliente || {};
    plano.pagamentos = plano.pagamentos || {};
    render();
  } catch(e) {
    renderErro('Erro de conexão', 'Não foi possível carregar seu planejamento. Tente novamente.');
  }
}

function renderErro(titulo, sub) {
  document.getElementById('main').innerHTML = `<div class="error-box">
    <div class="error-icon">🔍</div>
    <div class="error-title">${titulo}</div>
    <div class="error-sub">${sub}</div>
  </div>`;
}

function fmtISO(iso) { const [y,m,d] = iso.split('-'); return d+'/'+m; }
function fmtBRL(v) { return 'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2}); }
function freqLabel(f) { return {semanal:'Semanal',quinzenal:'Quinzenal',mensal:'Mensal'}[f]||f; }

function groupByMonth(dates) {
  const map = {};
  dates.forEach(iso => {
    const [y,m] = iso.split('-');
    const key = y+'-'+m;
    if (!map[key]) map[key]={year:parseInt(y),month:parseInt(m)-1,isos:[]};
    map[key].isos.push(iso);
  });
  return Object.values(map).sort((a,b)=>a.year!==b.year?a.year-b.year:a.month-b.month);
}

async function togglePagCliente(iso) {
  const jaConfirmado = !!(plano.pagamentos||{})[iso];
  if (jaConfirmado) {
    toast('Este pagamento já foi confirmado pela profissional ✓', 'success');
    return;
  }
  const jasolicitado = !!(plano.pagamentos_cliente||{})[iso];
  const novoPagCliente = {...(plano.pagamentos_cliente||{})};
  novoPagCliente[iso] = !jasolicitado;
  try {
    await api('PATCH', `planejamentos?token=eq.${token}`, { pagamentos_cliente: novoPagCliente });
    plano.pagamentos_cliente = novoPagCliente;
    toast(novoPagCliente[iso] ? 'Pagamento informado! Aguardando confirmação 🕐' : 'Marcação removida', novoPagCliente[iso] ? 'info' : '');
    render();
  } catch(e) { toast('Erro ao salvar. Tente novamente.', ''); }
}

function render() {
  const sessoes = plano.sessoes || [];
  const byMonth = groupByMonth(sessoes);
  const pags = plano.pagamentos || {};
  const pagsCliente = plano.pagamentos_cliente || {};
  const confirmados = sessoes.filter(iso => pags[iso]).length;
  const solicitados = sessoes.filter(iso => pagsCliente[iso] && !pags[iso]).length;
  const valorTotal = sessoes.length * plano.preco;
  const valorPago = confirmados * plano.preco;

  let html = `
    <div class="welcome">
      <div class="welcome-name">Olá, ${plano.nome_paciente}!</div>
      <div class="welcome-sub">Aqui está o seu planejamento financeiro. Informe quando realizar o pagamento de cada encontro.</div>
    </div>
    <div class="summary">
      <div class="stat"><div class="stat-label">Encontros</div><div class="stat-value">${sessoes.length}</div><div class="stat-sub">${confirmados} confirmado${confirmados!==1?'s':''}</div></div>
      <div class="stat"><div class="stat-label">Confirmado</div><div class="stat-value" style="font-size:15px">${fmtBRL(valorPago)}</div></div>
      <div class="stat"><div class="stat-label">A pagar</div><div class="stat-value" style="font-size:15px">${fmtBRL(valorTotal-valorPago)}</div></div>
    </div>`;

  byMonth.forEach(m => {
    const confirmadosNoMes = m.isos.filter(iso => pags[iso]).length;
    const totalMes = m.isos.length * plano.preco;
    const sessionsHtml = m.isos.map(iso => {
      const confirmado = !!pags[iso];
      const solicitado = !!pagsCliente[iso] && !confirmado;
      const rowClass = confirmado ? 'confirmado' : solicitado ? 'solicitado' : '';
      return `<div class="session-row ${rowClass}">
        <div class="session-left">
          <div class="session-dot"></div>
          <span class="session-date">${fmtISO(iso)}</span>
          ${plano.preco > 0 ? '<span class="session-price">'+fmtBRL(plano.preco)+'</span>' : ''}
        </div>
        <div class="session-right">
          <label class="pay-label-wrap ${confirmado?'disabled':''}">
            <input type="checkbox" class="pay-check"
              ${confirmado||solicitado?'checked':''}
              ${confirmado?'disabled':''}
              onchange="togglePagCliente('${iso}')">
            <span class="pay-text">${confirmado ? 'Confirmado ✓' : solicitado ? 'Informado ✓' : 'Informar pagamento'}</span>
          </label>
          ${solicitado ? '<span class="aguardando-text">Aguardando confirmação...</span>' : ''}
        </div>
      </div>`;
    }).join('');

    html += `<div class="month-card">
      <div class="month-header">
        <div class="month-title">${MONTHS[m.month]} ${m.year}</div>
        <div class="month-summary">${m.isos.length} encontro${m.isos.length!==1?'s':''} · ${confirmadosNoMes} confirmado${confirmadosNoMes!==1?'s':''}</div>
      </div>
      <div class="sessions-list">${sessionsHtml}</div>
      ${plano.preco > 0 ? '<div class="month-footer"><span class="month-count">Total do mês</span><span class="month-total">'+fmtBRL(totalMes)+'</span></div>' : ''}
    </div>`;
  });

  document.getElementById('main').innerHTML = html;
}

carregarCabecalho();
carregar();
</script>
</body>
</html>
